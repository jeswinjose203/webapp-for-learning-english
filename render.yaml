services:
  - type: web
    name: english-learning-app
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
      cp -r ../frontend/dist ../backend/static
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: english-learning-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - key: TTS_VOICE
        value: nova
      - key: DEBUG
        value: "false"

databases:
  - name: english-learning-db
    plan: free
    databaseName: english_learning
    user: appuser
